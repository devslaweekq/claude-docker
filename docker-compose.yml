# Installed layout (~/claude-docker) — image from Docker Hub, no local build.
services:
  claude:
    image: slaweekq/claude-docker:latest
    labels:
      - claude-docker.role=session
    network_mode: host
    stdin_open: true
    tty: true
    user: '0:0'
    env_file:
      - .env
    volumes:
      - ${CLAUDE_HOME}:/home/node
      - ./certs:/tmp/certs-input:ro
      # /workspace/<name> mounts are passed dynamically by the launcher via -v flags (PROJECT_DIRS)

  comfyui:
    image: yanwk/comfyui-boot:latest
    labels:
      - claude-docker.role=comfyui
    profiles:
      - comfyui
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${COMFYUI_HOME}/models:/root/ComfyUI/models
      - ${COMFYUI_HOME}/output:/root/ComfyUI/output
      - ${COMFYUI_HOME}/user:/root/ComfyUI/user
    restart: 'no'
