# Installed layout (~/claude-docker) — image from Docker Hub, no local build.
services:
  claude:
    image: slaweekq/claude-docker:latest
    labels:
      - claude-docker.role=session
    network_mode: host
    stdin_open: true
    tty: true
    user: '0:0'
    environment:
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    env_file:
      - .env
    volumes:
      - ${CLAUDE_HOME}:/home/node
      - ./certs:/tmp/certs-input:ro
      # /workspace/<name> mounts are passed dynamically by the launcher via -v flags (PROJECT_DIRS)

  # ComfyUI — host network, listens on localhost:8188 (see PORTS.md)
  comfyui:
    image: slaweekq/comfyui:latest
    labels:
      - claude-docker.role=comfyui
    profiles:
      - comfyui
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${COMFYUI_HOME}/models:/opt/ComfyUI/models
      - ${COMFYUI_HOME}/output:/opt/ComfyUI/output
      - ${COMFYUI_HOME}/user:/opt/ComfyUI/user
      # torch + ComfyUI deps install here on first run (entrypoint.sh), not
      # baked into the image — persists across container recreation.
      - ${COMFYUI_HOME}/venv:/opt/venv
    restart: 'no'

  # Headroom proxy — host network, listens on localhost:8787 (see PORTS.md)
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    labels:
      - claude-docker.role=headroom
    profiles:
      - headroom
    network_mode: host
    environment:
      - HEADROOM_HOST=0.0.0.0
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - no_proxy=${NO_PROXY:-}
      # Speed tuning (documented only in headroom's CHANGELOG.md, not the stable config docs —
      # revisit these if a future headroom release changes their meaning or defaults).
      - HEADROOM_BACKGROUND_COMPRESSION=true # forward uncompressed immediately, compress in background — biggest latency win for a single interactive session
      - HEADROOM_TEXT_CRUSHER=true # fast deterministic compressor instead of the ModernBERT model
      - HEADROOM_COMPRESSION_DEADLINE_MS=150 # cap worst-case compression stall per request
      - HEADROOM_KOMPRESS_MAX_TOKENS=50000 # route oversized turns around the ML model entirely
      - HEADROOM_COLD_START_FAST_PASS_TIMEOUT_SECONDS=5 # shrink the first-request cold-start budget (default 10s)
    volumes:
      - ${HEADROOM_HOME}/.headroom:/home/nonroot/.headroom
    restart: 'no'

  # Dashboard — read-only session monitoring, host network, listens on localhost:7900 (see PORTS.md)
  dashboard:
    image: slaweekq/claude-docker-dashboard:latest
    labels:
      - claude-docker.role=dashboard
    profiles:
      - dashboard
    network_mode: host
    user: 'node' # browser-facing; runs unprivileged, unlike dashboard-watcher (needs docker.sock)
    entrypoint: ['/usr/local/bin/claude-dashboard-serve']
    environment:
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    env_file:
      - .env
    volumes:
      - ${CLAUDE_HOME}:/home/node
    restart: 'no'

  # Dashboard watcher — headless container-stats collector, NO exposed port, holds docker.sock
  # (read-only) so the browser-facing `dashboard` service above never needs it. See dashboard/README.md.
  dashboard-watcher:
    image: slaweekq/claude-docker-dashboard:latest
    labels:
      - claude-docker.role=dashboard-watcher
    profiles:
      - dashboard
    network_mode: host
    entrypoint: ['/usr/local/bin/claude-dashboard-watcher-serve']
    environment:
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    env_file:
      - .env
    volumes:
      - ${CLAUDE_HOME}:/home/node
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: 'no'
