services:
  claude-dev:
    build: .
    image: slaweekq/claude-docker:latest
    labels:
      - claude-docker.role=session
    network_mode: host # reuse host network (Tailscale) for access to DB
    stdin_open: true # -i
    tty: true # -t  (interactive claude console)
    user: '0:0' # update-ca-certificates needs root; claude-launch runs as node (update-certs.sh in image)
    environment:
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    env_file:
      - ./.env # secrets + settings (token, proxy, PROJECT_DIRS, GH_TOKEN)
    volumes:
      # persistent Claude home on host (~/claude-docker/home)
      - ${CLAUDE_HOME}:/home/node
      # TLS proxy CA(s) — same as old Dockerfile COPY certs/, applied at start
      - ./certs:/tmp/certs-input:ro
      # /workspace/<name> mounts are passed dynamically by the launcher via -v flags (PROJECT_DIRS)

  # ComfyUI — host network, listens on localhost:8188 (see PORTS.md)
  comfyui:
    build:
      context: ./comfyui
    image: slaweekq/comfyui:latest
    labels:
      - claude-docker.role=comfyui
    profiles:
      - comfyui
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${COMFYUI_HOME}/models:/opt/ComfyUI/models
      - ${COMFYUI_HOME}/output:/opt/ComfyUI/output
      - ${COMFYUI_HOME}/user:/opt/ComfyUI/user
      # torch + ComfyUI deps install here on first run (entrypoint.sh), not
      # baked into the image — persists across container recreation.
      - ${COMFYUI_HOME}/venv:/opt/venv
    restart: 'no'

  # Headroom proxy — host network, listens on localhost:8787 (see PORTS.md)
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    labels:
      - claude-docker.role=headroom
    profiles:
      - headroom
    network_mode: host
    environment:
      - HEADROOM_HOST=0.0.0.0
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - no_proxy=${NO_PROXY:-}
    volumes:
      - ${HEADROOM_HOME}/.headroom:/home/nonroot/.headroom
    restart: 'no'
