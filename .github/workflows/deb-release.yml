name: Release deb

# Triggers only when files that affect the .deb package change.
# Runs in parallel with docker-publish.yml — each workflow owns its own paths.

on:
  push:
    branches:
      - main
      - master
    paths:
      - claude-docker/launcher
      - docker-compose.yml
      - .env.example
      - package.json
      - scripts/deb/**
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install reprepro
        run: sudo apt-get update -qq && sudo apt-get install -y reprepro dpkg-dev

      - name: Build deb
        run: npm run build:deb

      - name: Build changelogs body
        id: changelogs
        run: |
          files=$(git diff --name-only HEAD~1 HEAD -- 'changelogs/*.md' | grep -v README | sort)
          body=""
          for f in $files; do
            [ -f "$f" ] && body="$body$(cat "$f")"$'\n\n'
          done
          if [ -z "$body" ]; then body="No changelogs entries for this release."; fi
          {
            echo "BODY<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelogs.outputs.BODY }}
          files: dist/claude-docker_${{ steps.version.outputs.VERSION }}_all.deb

      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: apt-repo

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "9B2E96DB2175D394B5E1B8DE8FD8314EA97E4DB6:6:" | gpg --import-ownertrust

      - name: Publish to APT repository
        run: |
          cd apt-repo
          reprepro includedeb stable ../dist/claude-docker_${{ steps.version.outputs.VERSION }}_all.deb

      - name: Push gh-pages
        run: |
          cd apt-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "apt: publish v${{ steps.version.outputs.VERSION }}"
          git push
