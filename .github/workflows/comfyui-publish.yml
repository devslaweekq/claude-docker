name: ComfyUI Publish

# Required repo secrets:
#   DOCKER_USERNAME — Docker Hub login (e.g. slaweekq)
#   DOCKER_PASSWORD — Docker Hub access token (not account password)
#
# Registry cache: slaweekq/comfyui:buildcache

on:
  push:
    branches: [main, master]
    paths:
      - comfyui/Dockerfile
      - comfyui/entrypoint.sh
      - comfyui/workflows/**
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The image is now thin (torch/ComfyUI deps install into a mounted
      # volume at container start, not into image layers), but keep this —
      # ubuntu-latest ships ~30GB of preinstalled toolchains we don't use,
      # and buildx still needs headroom for the base image + build cache.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune -af --volumes
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: bash ./scripts/docker/build.sh --comfyui

      - name: Push
        run: bash ./scripts/docker/push.sh --comfyui
