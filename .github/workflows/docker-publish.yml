name: Docker Publish

# Required repo secrets:
#   DOCKER_USERNAME — Docker Hub login (e.g. slaweekq)
#   DOCKER_PASSWORD — Docker Hub access token (not account password)
#
# Registry cache: slaweekq/claude-docker:buildcache

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - scripts/update-certs.sh
      - scripts/ensure-claude-cli.sh
      - scripts/menu.sh
      - scripts/sessions.js
      - claude-defaults/**
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: bash ./scripts/push.sh
