name: Dashboard Publish

# Required repo secrets:
#   DOCKER_USERNAME — Docker Hub login (e.g. slaweekq)
#   DOCKER_PASSWORD — Docker Hub Personal Access Token with "Read, Write, Delete" scope
#                     (not account password)
#
# Registry cache: slaweekq/claude-docker-dashboard:buildcache

on:
  push:
    branches: [main, master]
    paths:
      - dashboard/**
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: bash ./scripts/docker/build.sh --dashboard

      - name: Push
        run: bash ./scripts/docker/push.sh --dashboard

      - name: Sync Docker Hub overview from dashboard/README.md
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/claude-docker-dashboard
          readme-filepath: ./dashboard/README.md
          short-description: Read-only session monitoring dashboard for claude-docker
